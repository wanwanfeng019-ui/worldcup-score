<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2026世界杯比分随机抽取器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0a1628,#1a2a4a 50%,#0d1f3c);
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  display:flex;justify-content:center;align-items:center;padding:15px;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(0,200,100,.06),transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(0,150,255,.05),transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(255,180,0,.04),transparent 50%);
  pointer-events:none;z-index:0;
}
.container{position:relative;z-index:1;width:100%;max-width:520px}

.header{text-align:center;margin-bottom:20px}
.header .trophy{font-size:42px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.header h1{font-size:1.5em;font-weight:900;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:6px 0 4px;letter-spacing:1px}
.header .subtitle{color:#6a7d95;font-size:.75em;letter-spacing:3px}

.match-card{
  background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:24px 16px 20px;
  backdrop-filter:blur(20px);box-shadow:0 30px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
}

.stage{text-align:center;margin-bottom:18px}
.stage span{display:inline-block;background:rgba(255,215,0,.12);color:#ffd700;padding:5px 18px;border-radius:20px;font-size:.78em;font-weight:700;letter-spacing:2px;border:1px solid rgba(255,215,0,.25)}

/* ── Teams Row ── */
.teams-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px}
.team-slot{flex:1;text-align:center;min-width:0}
.team-slot .flag{font-size:42px;display:block;margin-bottom:2px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3))}
.team-strength{display:inline-block;font-size:.6em;font-weight:800;padding:2px 8px;border-radius:8px;margin-bottom:5px;letter-spacing:1px}

.picker-wrap{position:relative}
.picker-input{
  width:100%;padding:9px 26px 9px 9px;border-radius:10px;
  border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);
  color:#fff;font-size:.8em;font-weight:600;text-align:center;outline:none;cursor:pointer;transition:all .2s;caret-color:transparent;
}
.picker-input:focus{border-color:#ffd700;box-shadow:0 0 0 3px rgba(255,215,0,.12);caret-color:#fff}
.picker-arrow{position:absolute;right:7px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);pointer-events:none;font-size:.65em;transition:transform .2s}
.picker-wrap.open .picker-arrow{transform:translateY(-50%) rotate(180deg)}

.dropdown{
  position:absolute;top:100%;left:0;right:0;margin-top:4px;
  background:#1a2a45;border:1px solid rgba(255,255,255,.2);border-radius:10px;
  max-height:0;overflow:hidden;z-index:10;transition:max-height .25s,padding .25s;box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.picker-wrap.open .dropdown{max-height:230px;padding:5px 0}
.dropdown-search{width:calc(100% - 10px);margin:3px 5px 5px;padding:7px 9px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:#fff;font-size:.78em;outline:none}
.dropdown-search:focus{border-color:#ffd700}
.dropdown-list{max-height:170px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dropdown-list::-webkit-scrollbar{width:3px}
.dropdown-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.dropdown-item{padding:8px 10px;cursor:pointer;font-size:.78em;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s;display:flex;align-items:center;gap:6px}
.dropdown-item:hover,.dropdown-item.active{background:rgba(255,215,0,.15);color:#fff}
.dropdown-item .tier-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dropdown-empty{padding:14px;text-align:center;color:#666;font-size:.75em}

.vs{flex-shrink:0;font-size:1.2em;font-weight:900;color:rgba(255,255,255,.2);margin-top:42px;padding:0 2px}

/* ── Analysis bar ── */
.analysis-bar{text-align:center;margin:4px 0 10px;min-height:1.5em}
.analysis-bar span{font-size:.7em;padding:4px 12px;border-radius:10px;letter-spacing:1px}

/* ── Score ── */
.score-display{text-align:center;margin:16px 0;min-height:80px;display:flex;align-items:center;justify-content:center;gap:12px}
.score-box{
  background:linear-gradient(180deg,rgba(0,0,0,.5),rgba(0,0,0,.3));
  border:2px solid rgba(255,255,255,.15);border-radius:16px;
  width:82px;height:82px;display:flex;align-items:center;justify-content:center;
  font-size:2.8em;font-weight:900;color:#fff;transition:all .12s;
  text-shadow:0 0 25px rgba(255,255,255,.25);flex-shrink:0;
}
.score-box.rolling{animation:shake .07s infinite;border-color:#ffd700;box-shadow:0 0 35px rgba(255,215,0,.4)}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,2px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-2px,-2px)}}
.score-dash{font-size:2.2em;color:rgba(255,255,255,.2);font-weight:300;flex-shrink:0}

/* ── Buttons ── */
.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.btn{padding:12px 18px;border-radius:12px;border:none;font-size:.9em;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.5px;outline:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a1a;font-size:1.1em;padding:14px 36px;box-shadow:0 8px 28px rgba(255,180,0,.3);width:100%;max-width:260px}
.btn-sm{background:rgba(255,255,255,.07);color:#ccc;border:1px solid rgba(255,255,255,.15);padding:9px 14px;font-size:.78em}
.share-bar{margin-top:10px;display:flex;gap:8px;justify-content:center}
.btn-copy{background:rgba(255,255,255,.05);color:#8af;border:1px solid rgba(100,160,255,.25);padding:8px 14px;border-radius:10px;font-size:.75em;font-weight:600;cursor:pointer;transition:all .2s;outline:none}
.btn-copy:active{background:rgba(100,160,255,.15)}

.prob-hint{text-align:center;margin-top:10px;font-size:.72em;color:#4a5f7a;min-height:1.2em}

/* ── History ── */
.history{margin-top:14px;background:rgba(0,0,0,.3);border-radius:14px;padding:12px 14px;border:1px solid rgba(255,255,255,.05)}
.history h3{color:#6a7d95;font-size:.78em;letter-spacing:2px;margin-bottom:8px;text-align:center}
.history-list{max-height:150px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:4px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:8px;font-size:.72em;color:#bbb;animation:fadeIn .35s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.history-item .teams{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .score{font-weight:900;color:#ffd700;font-size:1em;min-width:38px;text-align:center}
.history-item .time{color:#555;font-size:.75em;min-width:38px;text-align:right}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

.footer{text-align:center;margin-top:18px;color:#3a4f65;font-size:.7em;letter-spacing:1px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#1a1a1a;padding:10px 24px;border-radius:22px;font-weight:700;font-size:.85em;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1}

/* ── Match insight popup ── */
.insight-pop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.insight-pop.show{opacity:1;pointer-events:auto}
.insight-card{background:#1a2a45;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:30px 24px;text-align:center;max-width:320px;width:90%}
.insight-card h2{color:#ffd700;font-size:1.2em;margin-bottom:16px}
.insight-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.insight-row:last-child{border-bottom:none}
.insight-label{color:#8a9bb5;font-size:.8em}
.insight-val{color:#fff;font-weight:700;font-size:.85em}
.insight-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.1);margin:8px 0;overflow:hidden}
.insight-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.insight-close{margin-top:16px;padding:10px 30px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-weight:700;cursor:pointer;font-size:.85em}

@media(max-width:380px){
  .header h1{font-size:1.2em}
  .team-slot .flag{font-size:34px}
  .score-box{width:68px;height:68px;font-size:2.2em}
  .match-card{padding:18px 10px 14px}
  .picker-input{font-size:.7em;padding:8px 22px 8px 7px}
  .btn{padding:10px 14px;font-size:.78em}
  .btn-primary{padding:12px 24px;font-size:.95em}
}
</style>
</head>

  <div class="footer">⚽ 2026 FIFA World Cup · 89支球队 · 实力分级 · 仅供娱乐 ⚽</div>
</div>

</div>

  { name:'🇧🇴 玻利维亚', flag:'🇧🇴', code:'BOL', rating:69 },

  { name:'🇭🇳 洪都拉斯', flag:'🇭🇳', code:'HON', rating:68 },

  { name:'🇸🇾 叙利亚', flag:'🇸🇾', code:'SYR', rating:66 },

  { name:'🇹🇭 泰国', flag:'🇹🇭', code:'THA', rating:65 },
  { name:'🇻🇳 越南', flag:'🇻🇳', code:'VIE', rating:65 },
  { name:'🇸🇻 萨尔瓦多', flag:'🇸🇻', code:'SLV', rating:65 },

const STAGES = [
  '🎲 随机抽签','🏟 小组赛第1轮','🏟 小组赛第2轮','🏟 小组赛第3轮',
  '🔥 1/16 决赛','🔥 1/8 决赛','⚡ 1/4 决赛','💥 半决赛',
  '🥉 三四名决赛','🏆 决赛',
];

// ═══ Tier helper ═══
function getTier(r) {
  if(r>=90) return {l:'S',c:'#ffd700',bg:'rgba(255,215,0,.2)',desc:'冠军级'};
  if(r>=85) return {l:'A',c:'#ff6b6b',bg:'rgba(255,107,107,.2)',desc:'顶级强队'};
  if(r>=80) return {l:'B',c:'#ff9f43',bg:'rgba(255,159,67,.2)',desc:'劲旅'};
  if(r>=76) return {l:'C',c:'#54a0ff',bg:'rgba(84,160,255,.2)',desc:'实力派'};
  if(r>=72) return {l:'D',c:'#5f27cd',bg:'rgba(95,39,205,.2)',desc:'中坚'};
  if(r>=68) return {l:'E',c:'#1dd1a1',bg:'rgba(29,209,161,.2)',desc:'发展中'};
  return {l:'F',c:'#8395a7',bg:'rgba(131,149,167,.2)',desc:'挑战者'};
}

// ═══ Dynamic score weights based on rating gap ═══
function getScoreWeights(gap) {
  const abs = Math.abs(gap);
  const favA = gap >= 0;
  function f(h,a) { return favA ? [h,a] : [a,h]; }

  let w;
  if (abs <= 3) {
    w = [[1,0,16],[0,0,14],[1,1,12],[2,1,10],[0,1,9],[2,0,8],[3,1,5],[2,2,4],[3,0,3],[0,2,3],[1,2,3],[3,2,3],[4,1,2],[4,2,1],[4,0,1],[3,3,1],[0,3,0.8],[1,3,0.8],[5,1,0.5],[5,0,0.5],[4,3,0.4]];
  } else if (abs <= 6) {
    w = [[2,0,15],[1,0,12],[2,1,10],[3,0,9],[3,1,8],[1,1,7],[4,1,6],[4,0,5],[0,0,4],[3,2,4],[2,2,3],[0,1,3],[5,1,3],[4,2,2],[5,0,2],[0,2,2],[1,2,2],[5,2,1],[6,1,0.8],[6,0,0.8],[4,3,0.6]];
  } else if (abs <= 12) {
    w = [[3,0,13],[2,0,11],[3,1,10],[4,0,9],[4,1,8],[2,1,6],[5,0,5],[5,1,5],[1,0,4],[3,2,4],[4,2,3],[1,1,3],[6,0,3],[6,1,2],[0,0,2],[5,2,2],[7,0,2],[7,1,1],[4,3,1],[0,1,0.8]];
  } else if (abs <= 18) {
    w = [[4,0,13],[3,0,10],[5,0,9],[4,1,8],[3,1,7],[5,1,6],[2,0,5],[6,0,5],[6,1,4],[5,2,4],[7,0,4],[4,2,3],[2,1,3],[1,0,2],[7,1,2],[8,0,2],[3,2,2],[1,1,1.5],[0,0,1],[6,2,1]];
  } else {
    w = [[5,0,11],[6,0,10],[4,0,9],[7,0,8],[5,1,6],[8,0,6],[3,0,5],[6,1,5],[4,1,4],[9,0,4],[7,1,4],[5,2,3],[2,0,3],[10,0,3],[8,1,2],[6,2,2],[3,1,2],[1,0,1.5],[11,0,1],[0,0,0.5]];
  }
  return w.map(([h,a,wt]) => [...f(h,a), wt]);
}

// ═══ State ═══
let selA=0, selB=1, history=[], openPicker=null;

// ═══ DOM ═══
const $=id=>document.getElementById(id);
const flagA=$('flagA'),flagB=$('flagB'),strengthA=$('strengthA'),strengthB=$('strengthB');
const inputA=$('pickerInputA'),inputB=$('pickerInputB');
const wrapA=$('pickerWrapA'),wrapB=$('pickerWrapB');
const listA=$('listA'),listB=$('listB');
const searchA=$('searchA'),searchB=$('searchB');
const scoreA=$('scoreA'),scoreB=$('scoreB');
const stageLabel=$('stageLabel'),probHint=$('probHint');
const analysisText=$('analysisText');
const historyPanel=$('historyPanel'),historyList=$('historyList');
const toast=$('toast');

// ═══ Init ═══
function init() {
  randomTeams();
  renderList('A',''); renderList('B','');

  inputA.addEventListener('click',()=>togglePicker('A'));
  inputB.addEventListener('click',()=>togglePicker('B'));
  searchA.addEventListener('input',()=>renderList('A',searchA.value));
  searchB.addEventListener('input',()=>renderList('B',searchB.value));
  searchA.addEventListener('click',e=>e.stopPropagation());
  searchB.addEventListener('click',e=>e.stopPropagation());

  document.addEventListener('click',e=>{
    if(!e.target.closest('#pickerWrapA')&&!e.target.closest('#pickerWrapB')) closeAll();
  });

  $('btnRoll').addEventListener('click',roll);
  $('btnTeams').addEventListener('click',randomTeams);
  $('btnClear').addEventListener('click',clearHistory);
  $('btnCopy').addEventListener('click',copyResult);
  $('btnInsight').addEventListener('click',showInsight);

  document.addEventListener('keydown',e=>{
    if((e.key==='Enter'||e.code==='Space')&&!openPicker){e.preventDefault();roll();}
  });

  updateAnalysis();
}

// ═══ Picker ═══
function togglePicker(side) {
  const wrap=side==='A'?wrapA:wrapB;
  const search=side==='A'?searchA:searchB;
  const wasOpen=wrap.classList.contains('open');
  closeAll();
  if(!wasOpen){wrap.classList.add('open');openPicker=side;renderList(side,'');search.value='';setTimeout(()=>search.focus(),50);}
}

function closeAll() { wrapA.classList.remove('open');wrapB.classList.remove('open');openPicker=null; }

function renderList(side,filter) {
  const list=side==='A'?listA:listB;
  const q=filter.toLowerCase().trim();
  const filtered=TEAMS.map((t,i)=>({...t,idx:i})).filter(t=>!q||t.name.toLowerCase().includes(q)||t.code.toLowerCase().includes(q));
  if(!filtered.length) { list.innerHTML='<div class="dropdown-empty">无匹配球队</div>';return; }
  list.innerHTML=filtered.map(t=>{
    const tier=getTier(t.rating);
    return `<div class="dropdown-item" data-idx="${t.idx}" data-side="${side}"><span class="tier-dot" style="background:${tier.c}"></span>${t.name} <span style="color:${tier.c};font-size:.7em;margin-left:auto">${t.rating}</span></div>`;
  }).join('');
  list.querySelectorAll('.dropdown-item').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();selectTeam(side,parseInt(el.dataset.idx));});
  });
}

function selectTeam(side,idx) {
  if(side==='A'){selA=idx;}else{selB=idx;}
  const t=TEAMS[idx], tier=getTier(t.rating);
  const input=side==='A'?inputA:inputB;
  const flag=side==='A'?flagA:flagB;
  const str=side==='A'?strengthA:strengthB;
  input.value=t.name; flag.textContent=t.flag;
  str.textContent=tier.l; str.style.background=tier.bg; str.style.color=tier.c;
  closeAll(); updateAnalysis();
}

function randomTeams() {
  let i,j; do { i=Math.floor(Math.random()*TEAMS.length); j=Math.floor(Math.random()*TEAMS.length); } while(i===j);
  selectTeam('A',i); selectTeam('B',j);
}

// ═══ Analysis ═══
function updateAnalysis() {
  const a=TEAMS[selA], b=TEAMS[selB];
  const gap=a.rating-b.rating;
  const tierA=getTier(a.rating), tierB=getTier(b.rating);
  const abs=Math.abs(gap);
  let emoji,label,bg;
  if(abs<=3)      {emoji='⚔️';label='势均力敌，胜负难料';bg='rgba(255,255,255,.06)';}
  else if(abs<=6) {emoji='🤏';label=(gap>0?a.code:b.code)+' 略占上风';bg='rgba(255,255,255,.06)';}
  else if(abs<=12){emoji='📈';label=(gap>0?a.code:b.code)+' 明显占优';bg='rgba(255,180,0,.08)';}
  else if(abs<=18){emoji='🔥';label=(gap>0?a.code:b.code)+' 实力碾压';bg='rgba(255,107,107,.08)';}
  else            {emoji='💀';label=(gap>0?a.code:b.code)+' 降维打击';bg='rgba(255,50,50,.1)';}
  analysisText.innerHTML=`<span style="background:${bg};color:#fff">${emoji} ${label}  |  ${tierA.desc} vs ${tierB.desc}</span>`;
}

function showInsight() {
  const a=TEAMS[selA], b=TEAMS[selB];
  const gap=a.rating-b.rating;
  const abs=Math.abs(gap);
  const tierA=getTier(a.rating), tierB=getTier(b.rating);

  $('insightNameA').textContent=a.flag+' '+a.code;
  $('insightRatingA').textContent='⭐ '+a.rating+' / '+tierA.desc;
  $('insightNameB').textContent=b.flag+' '+b.code;
  $('insightRatingB').textContent='⭐ '+b.rating+' / '+tierB.desc;

  $('insightBarA').style.width=(a.rating)+'%';
  $('insightBarA').style.background=tierA.c;
  $('insightBarB').style.width=(b.rating)+'%';
  $('insightBarB').style.background=tierB.c;

  $('insightGap').textContent=abs+' 分';
  $('insightGap').style.color=abs<=6?'#54a0ff':abs<=12?'#ff9f43':'#ff6b6b';

  let expect;
  if(abs<=3) expect='任何结果都有可能';
  else if(abs<=6) expect='强方胜率约 55-60%';
  else if(abs<=12) expect='强方胜率约 65-75%';
  else if(abs<=18) expect='强方胜率约 78-88%';
  else expect='强方胜率 > 90%';
  $('insightExpect').textContent=expect;

  $('insightPop').classList.add('show');
}

function closeInsight() { $('insightPop').classList.remove('show'); }
$('insightPop').addEventListener('click',function(e) { if(e.target===this) closeInsight(); });

// ═══ Score Roll ═══
function randomScore(gap) {
  const weights=getScoreWeights(gap);
  const total=weights.reduce((s,x)=>s+x[2],0);
  let r=Math.random()*total;
  for(const [h,a,wt] of weights) { r-=wt; if(r<=0) return[h,a]; }
  return[1,0];
}

function roll() {
  const teamA=TEAMS[selA], teamB=TEAMS[selB];
  const gap=teamA.rating-teamB.rating;
  const stage=STAGES[Math.floor(Math.random()*STAGES.length)];
  stageLabel.textContent=stage;

  const btns=document.querySelectorAll('button');
  btns.forEach(b=>b.disabled=true);

  scoreA.classList.add('rolling'); scoreB.classList.add('rolling');

  let ticks=0;
  const interval=setInterval(()=>{
    scoreA.textContent=Math.floor(Math.random()*7);
    scoreB.textContent=Math.floor(Math.random()*7);
    ticks++;
    if(ticks>=18){
      clearInterval(interval);
      const [h,a]=randomScore(gap);
      scoreA.textContent=h; scoreB.textContent=a;
      scoreA.classList.remove('rolling'); scoreB.classList.remove('rolling');
      scoreA.style.color='#ffd700'; scoreB.style.color='#ffd700';
      setTimeout(()=>{scoreA.style.color='#fff';scoreB.style.color='#fff';},300);
      btns.forEach(b=>b.disabled=false);
      addHistory(teamA,teamB,h,a,gap,stage);
      updateHint(teamA,teamB,h,a,gap);
    }
  },80);
}

function updateHint(teamA,teamB,h,a,gap) {
  const abs=Math.abs(gap);
  const winner=h>a?teamA:h<a?teamB:null;
  const diff=Math.abs(h-a);
  let desc='',emoji='';

  if(winner===null){desc='平局！';emoji='⚖️';}
  else if(gap>0&&winner===teamA){desc='强队取胜';emoji=abs>12?'✅':'👌';}
  else if(gap<0&&winner===teamB){desc='强队取胜';emoji=abs>12?'✅':'👌';}
  else if(gap>0&&winner===teamB){desc='爆冷！';emoji='💥';}
  else if(gap<0&&winner===teamA){desc='爆冷！';emoji='💥';}

  if(diff>=4) desc+=' 大比分！';
  probHint.textContent=`${teamA.code} ${h}-${a} ${teamB.code}  |  ${emoji} ${desc}`;
}

// ═══ History ═══
function addHistory(teamA,teamB,h,a,gap,stage) {
  const time=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  history.unshift({teamA,teamB,h,a,gap,stage,time});
  if(history.length>50) history.pop();
  renderHistory();
}

function renderHistory() {
  if(!history.length){historyPanel.style.display='none';return;}
  historyPanel.style.display='block';
  historyList.innerHTML=history.map(x=>`
    <div class="history-item">
      <span class="teams">${x.teamA.flag} ${x.teamA.code} vs ${x.teamB.flag} ${x.teamB.code}</span>
      <span class="score">${x.h}:${x.a}</span>
      <span class="time">${x.time}</span>
    </div>
  `).join('');
}

function clearHistory() { history=[]; renderHistory(); probHint.textContent='点击按钮随机生成比分 · 实力差距影响结果概率'; }

// ═══ Copy ═══
function copyResult() {
  const h=scoreA.textContent, a=scoreB.textContent;
  if(h==='-'||a==='-'){showToast('⚠️ 请先抽取比分');return;}
  const teamA=TEAMS[selA], teamB=TEAMS[selB];
  const gap=Math.abs(teamA.rating-teamB.rating);
  const text=`⚽ 2026世界杯比分\n\n${teamA.flag} ${teamA.name} (${teamA.rating})  ${h} : ${a}  (${teamB.rating}) ${teamB.name} ${teamB.flag}\n\n${stageLabel.textContent}\n实力差: ${gap}分 | 🎰 仅供娱乐`;
  if(navigator.clipboard&&navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(()=>showToast('✅ 已复制！'));
  } else {
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('✅ 已复制！');
  }
}

function showToast(msg) { toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),1800); }

init();
</script>
